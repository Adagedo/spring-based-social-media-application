spring:
  profile: dev
  application:
    name: application
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl_auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: mysql

jwt:
  secret: ${JWT_SECRET}
  accessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES}
server:
  port: 8888
kind: Application