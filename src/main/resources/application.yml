spring:
  profile: dev
  application:
    name: application
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl_auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: mysql
  servlet:
    multipart:
          max-file-size: 20MB
          max-request-size: 20MB

jwt:
  secret: ${JWT_SECRET}
  access_token_minutes: ${JWT_ACCESS_TOKEN_MINUTES}
  token_name: ${JWT_TOKEN_NAME}
server:
  port: 8888

storage:
  upload_dir: uploads/images

kind: Application